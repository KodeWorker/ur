repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
      - id: cmake-lint

  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=file]
        exclude: ^third_party/
      # - id: clang-tidy # after build, so that it can use the compile_commands.json
      #   args: [--build-path=build]
      # - id: uncrustify # conflicts with clang-format
      #   args: [-c=.uncrustify.cfg]
      - id: cppcheck
        exclude: ^third_party/
        args:
          # permanent: FetchContent headers are not on the system include path
          - --suppress=missingIncludeSystem
          - --suppress=missingInclude
          # permanent: SQLite amalgamation uses C-style unread struct members
          - --suppress=unusedStructMember
          # permanent: inline suppress comments that cppcheck itself emits
          - --suppress=unmatchedSuppression
          # permanent: free functions used across TUs are not visible to cppcheck
          - --suppress=unusedFunction
          # permanent: third-party headers (sqlite3, mbedtls) trigger false syntax errors
          - --suppress=syntaxError
          # permanent: const-ref lint fires on correct pass-by-value intentional stubs
          - --suppress=constParameterReference
          # TODO(phase3): remove once Chat / PersonaUpdater private helpers are implemented
          - --suppress=unusedPrivateFunction
          # TODO(phase3): remove once is_meaningful() stub is replaced with real logic
          - --suppress=knownConditionTrueFalse
      # - id: include-what-you-use # after build, so that it can use the compile_commands.json
      #   args: [-p=build]

  - repo: https://github.com/cpplint/cpplint
    rev: 2.0.2
    hooks:
      - id: cpplint
        exclude: ^third_party/
        args:
          - --filter=-whitespace/line_length,-whitespace/parens,-legal/copyright,-build/c++17,-readability/todo,-build/include_subdir
